# Orchestrator Simulation Workflow Pipeline
name: orchestrator_simulation
pipeline:
  - stage: ideation_feasibility
    agent: business_analyst
    inputs: [project_concept.md]
    outputs: [project_blueprint.md]
  
  - stage: architecture_design
    agent: system_architect
    inputs: [project_blueprint.md]
    outputs: [architecture_notes.md]
  
  - stage: sprint_execution
    agent: project_manager
    inputs: [architecture_notes.md]
    outputs: [artifacts/frontend, artifacts/backend]
  
  - stage: the_crucible
    agent: qa_engineer
    inputs: [artifacts/frontend, artifacts/backend]
    outputs: [validation_report.md]
  
  - stage: deployment
    agent: devops_engineer
    inputs: [validation_report.md]
    outputs: [deployment_notes.md]
